# =============================================================================
# Yazi keymap — custom key bindings
# =============================================================================

[manager]
keymap = [
  # Navigation
  { on = "h",           run = "leave",          desc = "Go to parent" },
  { on = "j",           run = "arrow 1",         desc = "Move down" },
  { on = "k",           run = "arrow -1",        desc = "Move up" },
  { on = "l",           run = "open",            desc = "Open" },
  { on = "<Left>",      run = "leave",           desc = "Go to parent" },
  { on = "<Right>",     run = "open",            desc = "Open" },
  { on = "<Up>",        run = "arrow -1",        desc = "Move up" },
  { on = "<Down>",      run = "arrow 1",         desc = "Move down" },
  { on = "H",           run = "back",            desc = "History back" },
  { on = "L",           run = "forward",         desc = "History forward" },
  { on = "g",           run = "arrow -99999999", desc = "Go to top" },
  { on = "G",           run = "arrow 99999999",  desc = "Go to bottom" },
  { on = "<Ctrl-u>",    run = "arrow -50%",      desc = "Half page up" },
  { on = "<Ctrl-d>",    run = "arrow 50%",       desc = "Half page down" },
  { on = "<Ctrl-b>",    run = "arrow -100%",     desc = "Page up" },
  { on = "<Ctrl-f>",    run = "arrow 100%",      desc = "Page down" },

  # File operations
  { on = "<Enter>",     run = "open",            desc = "Open selected" },
  { on = "o",           run = "open --interactive", desc = "Open interactive" },
  { on = "O",           run = "open --interactive", desc = "Open interactive" },
  { on = "y",           run = "yank",            desc = "Yank (copy)" },
  { on = "Y",           run = "unyank",          desc = "Unyank" },
  { on = "x",           run = "yank --cut",      desc = "Yank (cut)" },
  { on = "p",           run = "paste",           desc = "Paste" },
  { on = "P",           run = "paste --force",   desc = "Paste (overwrite)" },
  { on = "d",           run = "remove",          desc = "Trash" },
  { on = "D",           run = "remove --permanently", desc = "Delete permanently" },
  { on = "a",           run = "create",          desc = "Create file/dir" },
  { on = "r",           run = "rename --cursor=before_ext", desc = "Rename" },
  { on = "<F2>",        run = "rename --cursor=before_ext", desc = "Rename" },

  # Selection
  { on = "<Space>",     run = "select --state=none", desc = "Toggle selection" },
  { on = "v",           run = "visual_mode",     desc = "Visual mode" },
  { on = "V",           run = "select_all --state=none", desc = "Select all" },

  # Copying paths
  { on = ["c", "c"],    run = "copy cell",       desc = "Copy filename" },
  { on = ["c", "d"],    run = "copy dirname",    desc = "Copy dir path" },
  { on = ["c", "f"],    run = "copy filename",   desc = "Copy full path" },
  { on = ["c", "p"],    run = "copy path",       desc = "Copy absolute path" },

  # Tabs
  { on = "t",           run = "tab_create --current", desc = "New tab" },
  { on = "1",           run = "tab_switch 0",    desc = "Tab 1" },
  { on = "2",           run = "tab_switch 1",    desc = "Tab 2" },
  { on = "3",           run = "tab_switch 2",    desc = "Tab 3" },
  { on = "]",           run = "tab_switch 1 --relative", desc = "Next tab" },
  { on = "[",           run = "tab_switch -1 --relative", desc = "Prev tab" },

  # Search / filter
  { on = "/",           run = "find --smart",    desc = "Find" },
  { on = "?",           run = "find --previous --smart", desc = "Find prev" },
  { on = "n",           run = "find_arrow",      desc = "Next match" },
  { on = "N",           run = "find_arrow --previous", desc = "Prev match" },
  { on = "f",           run = "filter --smart",  desc = "Filter" },
  { on = "s",           run = "search --via=fd", desc = "Search fd" },
  { on = "S",           run = "search --via=rg", desc = "Search ripgrep" },
  { on = "<Esc>",       run = ["escape", "search"],  desc = "Clear/escape" },

  # Sort
  { on = ["z", "n"],    run = "sort natural --dir-first", desc = "Sort natural" },
  { on = ["z", "N"],    run = "sort natural --dir-first --reverse", desc = "Sort natural rev" },
  { on = ["z", "m"],    run = "sort modified --dir-first", desc = "Sort modified" },
  { on = ["z", "M"],    run = "sort modified --dir-first --reverse", desc = "Sort modified rev" },
  { on = ["z", "s"],    run = "sort size --dir-first", desc = "Sort size" },
  { on = ["z", "e"],    run = "sort extension --dir-first", desc = "Sort ext" },
  { on = ["z", "h"],    run = "hidden toggle", desc = "Toggle hidden" },

  # Shell / actions
  { on = "!",           run = "shell --interactive",  desc = "Open shell" },
  { on = "<Ctrl-s>",    run = "shell --block --interactive", desc = "Shell (block)" },
  { on = "q",           run = "quit",            desc = "Quit" },
  { on = "Q",           run = "quit --no-cwd-file", desc = "Quit (no cwd)" },

  # Misc
  { on = ".",           run = "hidden toggle",   desc = "Toggle hidden" },
  { on = "R",           run = "reload",          desc = "Reload" },
  { on = ["g", "h"],    run = "cd ~",            desc = "Go home" },
  { on = ["g", "r"],    run = "cd /",            desc = "Go root" },
  { on = ["g", "t"],    run = "cd /tmp",         desc = "Go /tmp" },
]

[tasks]
keymap = [
  { on = "<Esc>", run = "close", desc = "Close task manager" },
  { on = "<Ctrl-q>", run = "close", desc = "Close task manager" },
  { on = "w", run = "close", desc = "Close task manager" },
  { on = "k", run = "arrow -1", desc = "Move up" },
  { on = "j", run = "arrow 1",  desc = "Move down" },
  { on = "<Up>",   run = "arrow -1", desc = "Move up" },
  { on = "<Down>", run = "arrow 1",  desc = "Move down" },
  { on = "<Enter>", run = "inspect", desc = "Inspect task" },
  { on = "x",      run = "cancel",  desc = "Cancel task" },
]

[select]
keymap = [
  { on = "<Esc>",   run = "close",           desc = "Cancel" },
  { on = "<Ctrl-q>", run = "close",          desc = "Cancel" },
  { on = "<Enter>", run = "close --submit",  desc = "Submit" },
  { on = "k",       run = "arrow -1",        desc = "Up" },
  { on = "j",       run = "arrow 1",         desc = "Down" },
  { on = "<Up>",    run = "arrow -1",        desc = "Up" },
  { on = "<Down>",  run = "arrow 1",         desc = "Down" },
]

[input]
keymap = [
  { on = "<Esc>",   run = "close",           desc = "Cancel" },
  { on = "<Enter>", run = "close --submit",  desc = "Submit" },
  { on = "<Ctrl-c>", run = "close",          desc = "Cancel" },
  { on = "h",       run = "move -1",         desc = "Move left" },
  { on = "l",       run = "move 1",          desc = "Move right" },
  { on = "<Left>",  run = "move -1",         desc = "Move left" },
  { on = "<Right>", run = "move 1",          desc = "Move right" },
  { on = "a",       run = "insert",          desc = "Insert" },
  { on = "A",       run = ["move 99999", "insert"], desc = "Move end + insert" },
  { on = "i",       run = "insert",          desc = "Insert" },
  { on = "I",       run = ["move -99999", "insert"], desc = "Move start + insert" },
  { on = "u",       run = "undo",            desc = "Undo" },
  { on = "<Ctrl-z>", run = "undo",           desc = "Undo" },
  { on = "<Ctrl-y>", run = "redo",           desc = "Redo" },
  { on = "w",       run = "forward word",    desc = "Forward word" },
  { on = "b",       run = "backward word",   desc = "Backward word" },
]
