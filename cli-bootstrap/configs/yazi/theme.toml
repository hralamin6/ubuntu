# =============================================================================
# Yazi theme Γאפ Catppuccin Macchiato
# =============================================================================

[flavor]
use = "catppuccin-macchiato"

[manager]
cwd = { fg = "#cad3f5" }

# Hovered item
hovered = { fg = "#181926", bg = "#8aadf4", bold = true }
preview_hovered = { underline = true }

# Find matches
find_keyword  = { fg = "#eed49f", bold = true, italic = true, underline = true }
find_position = { fg = "#f5a97f", bg = "reset", bold = true, italic = true }

# Markers
marker_copied = { fg = "#a6da95", bg = "#a6da95" }
marker_cut    = { fg = "#ed8796", bg = "#ed8796" }
marker_marked = { fg = "#c6a0f6", bg = "#c6a0f6" }

# Tab
tab_active   = { fg = "#181926", bg = "#8aadf4", bold = true }
tab_inactive = { fg = "#cad3f5", bg = "#363a4f" }
tab_width    = 1

# Borders
border_symbol = "Γפג"
border_style  = { fg = "#494d64" }

# Highlights
syntect_theme = "~/.config/bat/themes/Catppuccin Macchiato.tmTheme"

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#363a4f", bg = "#1e2030" }

mode_normal  = { fg = "#181926", bg = "#8aadf4", bold = true }
mode_select  = { fg = "#181926", bg = "#a6da95", bold = true }
mode_unset   = { fg = "#181926", bg = "#eed49f", bold = true }

progress_label  = { fg = "#cad3f5", bold = true }
progress_normal = { fg = "#8aadf4", bg = "#1e2030" }
progress_error  = { fg = "#ed8796", bg = "#1e2030" }

permissions_t = { fg = "#a6da95" }
permissions_r = { fg = "#eed49f" }
permissions_w = { fg = "#ed8796" }
permissions_x = { fg = "#8bd5ca" }
permissions_s = { fg = "#b7bdf8" }

[input]
border   = { fg = "#8aadf4" }
title    = { fg = "#cad3f5", bold = true }
value    = { fg = "#cad3f5" }
selected = { reversed = true }

[select]
border   = { fg = "#8aadf4" }
active   = { fg = "#cad3f5", bold = true }
inactive = { fg = "#6e738d" }

[tasks]
border  = { fg = "#8aadf4" }
title   = { fg = "#cad3f5", bold = true }
hovered = { underline = true }

[which]
mask = { bg = "#1e2030" }
cand = { fg = "#8bd5ca" }
rest = { fg = "#6e738d" }
desc = { fg = "#c6a0f6" }
separator       = "  "
separator_style = { fg = "#494d64" }

[notify]
title_info  = { fg = "#a6da95", bold = true }
title_warn  = { fg = "#eed49f", bold = true }
title_error = { fg = "#ed8796", bold = true }

[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#f5bde6" },
  # Media
  { mime = "video/*", fg = "#c6a0f6" },
  { mime = "audio/*", fg = "#c6a0f6" },
  # Archives
  { mime = "application/zip",      fg = "#eed49f" },
  { mime = "application/gzip",     fg = "#eed49f" },
  { mime = "application/x-tar",    fg = "#eed49f" },
  { mime = "application/x-bzip*",  fg = "#eed49f" },
  { mime = "application/x-7z*",    fg = "#eed49f" },
  { mime = "application/x-rar*",   fg = "#eed49f" },
  { mime = "application/xz",       fg = "#eed49f" },
  { mime = "application/zstd",     fg = "#eed49f" },
  # Documents
  { mime = "application/pdf",      fg = "#ed8796" },
  { mime = "application/doc",      fg = "#8aadf4" },
  { mime = "application/vnd.openxmlformats-officedocument.*", fg = "#8aadf4" },
  # Text
  { mime = "text/*",               fg = "#cad3f5" },
  # Code
  { mime = "application/json",     fg = "#a6da95" },
  { mime = "application/x-sh",     fg = "#a6da95" },
  # Executables
  { mime = "application/x-executable", fg = "#ed8796", bold = true },
  { mime = "application/x-sharedlib",  fg = "#f5a97f" },
  # Fallback
  { name = "*/",  fg = "#8aadf4", bold = true },
  { name = ".*",  fg = "#6e738d" },
]

