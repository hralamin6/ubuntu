# =============================================================================
# ~/.tmux.conf — Advanced tmux configuration
# =============================================================================
# cli-bootstrap — Production-quality terminal multiplexer config
# =============================================================================

# ---------------------------------------------------------------------------
# PREFIX KEY
# ---------------------------------------------------------------------------
# Default: Ctrl+b — Change to Ctrl+a for screen compatibility
# Uncomment to enable Ctrl+a prefix:
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# ---------------------------------------------------------------------------
# GENERAL
# ---------------------------------------------------------------------------
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc,kitty:Tc"
set-option -sa terminal-features ",xterm-256color:RGB"

# Reduce escape time (important for Neovim)
set-option -sg escape-time 10

# Increase repeat time for repeatable keys
set-option -g repeat-time 600

# Focus events (for Neovim)
set-option -g focus-events on

# Large scrollback buffer
set-option -g history-limit 100000

# Start windows/panes at 1 instead of 0
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Automatic window renaming
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string "#T — #W"

# Activity monitoring
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# ---------------------------------------------------------------------------
# MOUSE SUPPORT
# ---------------------------------------------------------------------------
set-option -g mouse on

# Drag to resize panes
bind-key -n MouseDrag1Border resize-pane -M

# Click to select window
bind-key -n MouseDown1Status select-window -t=

# Scroll in copy mode
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
  "send-keys -M" \
  "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# ---------------------------------------------------------------------------
# VI MODE
# ---------------------------------------------------------------------------
set-window-option -g mode-keys vi
set-option -g status-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line
bind-key -T copy-mode-vi K   send-keys -X halfpage-up
bind-key -T copy-mode-vi J   send-keys -X halfpage-down

# ---------------------------------------------------------------------------
# CLIPBOARD
# ---------------------------------------------------------------------------
# Use xclip or xsel for X11, wl-copy for Wayland
if-shell "command -v xclip" {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
  bind-key -T copy-mode    y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
} {
  if-shell "command -v wl-copy" {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
    bind-key -T copy-mode    y send-keys -X copy-pipe-and-cancel 'wl-copy'
  } {
    if-shell "command -v xsel" {
      bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'
      bind-key -T copy-mode    y send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'
    }
  }
}

# ---------------------------------------------------------------------------
# WINDOW / PANE MANAGEMENT
# ---------------------------------------------------------------------------

# Split panes using | and - (intuitive)
bind-key |   split-window -h -c "#{pane_current_path}"
bind-key -   split-window -v -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key %   split-window -h -c "#{pane_current_path}"

# New window in current directory
bind-key c   new-window -c "#{pane_current_path}"
bind-key C   new-window  # New window in home

# Navigate panes with hjkl
bind-key h   select-pane -L
bind-key j   select-pane -D
bind-key k   select-pane -U
bind-key l   select-pane -R

# Navigate panes without prefix (Ctrl+hjkl)
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Resize panes with HJKL (repeatable)
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Smart pane switching with awareness of vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Window navigation
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind-key -r Tab next-window
bind-key -r BTab previous-window

# Move windows
bind-key -n M-H swap-window -d -t -1
bind-key -n M-L swap-window -d -t +1

# Join/break panes
bind-key   @   choose-window 'join-pane -h -s "%%"'
bind-key   !   break-pane -d

# Zoom pane toggle
bind-key   z   resize-pane -Z

# Toggle layout
bind-key Space next-layout

# ---------------------------------------------------------------------------
# SESSION MANAGEMENT
# ---------------------------------------------------------------------------
bind-key   S   choose-session
bind-key   $   command-prompt -I "#S" "rename-session '%%'"
bind-key   R   source-file ~/.tmux.conf \; display "Config reloaded"
bind-key   X   confirm-before -p "Kill session #S? (y/n)" kill-session

# ---------------------------------------------------------------------------
# COPY MODE
# ---------------------------------------------------------------------------
bind-key Enter copy-mode       # Enter copy mode
bind-key -n PageUp copy-mode -eu  # PageUp enters copy mode and scrolls up

# ---------------------------------------------------------------------------
# SEARCH
# ---------------------------------------------------------------------------
bind-key / copy-mode \; send-keys "/"

# ---------------------------------------------------------------------------
# STATUS BAR
# ---------------------------------------------------------------------------
set-option -g status on
set-option -g status-position bottom
set-option -g status-interval 5
set-option -g status-justify left
set-option -g status-style "bg=#1e2030,fg=#cad3f5"

# Status left — session info
set-option -g status-left-length 60
set-option -g status-left \
  "#[fg=#181926,bg=#8aadf4,bold] 󰡛 #S #[fg=#8aadf4,bg=#363a4f,nobold]#[fg=#cad3f5,bg=#363a4f]  #{?client_prefix,⌨ ,  }#[fg=#363a4f,bg=#1e2030]"

# Status right — time, host, battery
set-option -g status-right-length 120
set-option -g status-right \
  "#[fg=#363a4f,bg=#1e2030]#[fg=#cad3f5,bg=#363a4f]  #{=/25/…:pane_current_command} #[fg=#494d64,bg=#363a4f]#[fg=#cad3f5,bg=#494d64]  #{=/30/…:#{b:pane_current_path}} #[fg=#8aadf4,bg=#494d64]#[fg=#181926,bg=#8aadf4,bold]  %H:%M   %d %b #[fg=#c6a0f6,bg=#8aadf4]#[fg=#181926,bg=#c6a0f6,bold] #h "

# Window tabs
set-window-option -g window-status-separator ""
set-window-option -g window-status-style "fg=#6e738d,bg=#1e2030"
set-window-option -g window-status-format \
  "#[fg=#1e2030,bg=#1e2030]#[fg=#6e738d,bg=#1e2030] #I:#W#{?window_flags,#{window_flags}, } #[fg=#1e2030,bg=#1e2030]"
set-window-option -g window-status-current-style "fg=#181926,bg=#8aadf4,bold"
set-window-option -g window-status-current-format \
  "#[fg=#1e2030,bg=#8aadf4]#[fg=#181926,bg=#8aadf4,bold] #I:#W#{?window_flags,#{window_flags}, } #[fg=#8aadf4,bg=#1e2030,nobold]"

set-window-option -g window-status-activity-style "fg=#eed49f,bg=#1e2030"
set-window-option -g window-status-bell-style "fg=#ed8796,bg=#1e2030,bold"

# ---------------------------------------------------------------------------
# PANE BORDERS
# ---------------------------------------------------------------------------
set-option -g pane-border-style "fg=#363a4f"
set-option -g pane-active-border-style "fg=#8aadf4"
set-option -g pane-border-status off

# ---------------------------------------------------------------------------
# MESSAGE / PROMPT STYLING
# ---------------------------------------------------------------------------
set-option -g message-style "fg=#cad3f5,bg=#363a4f,bold"
set-option -g message-command-style "fg=#eed49f,bg=#363a4f"

# ---------------------------------------------------------------------------
# POPUP / FLOATING WINDOWS
# ---------------------------------------------------------------------------
bind-key   g   display-popup -E -d '#{pane_current_path}' -w 80% -h 80% "lazygit 2>/dev/null || git log --oneline -20"
bind-key   F   display-popup -E -d '#{pane_current_path}' -w 80% -h 80% "yazi 2>/dev/null || ranger 2>/dev/null || ls -la"
bind-key   f   display-popup -E -d '#{pane_current_path}' -w 60% -h 60% \
  "fzf --preview 'bat --color=always {}' --bind 'enter:execute(${EDITOR:-nvim} {})+abort'"

